<!DOCTYPE html>
<html lang="da" style="color-scheme: dark;">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#222932" />
  <title>Projekt — Mohamed Portfolio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600;1,700&family=Geist:wght@400;500;600&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600;1,700&family=Geist:wght@400;500;600&display=swap" />
  <link rel="stylesheet" href="assets/css/projekt.css" />
</head>
<body>

  <a href="#main" class="skip-link">Spring til indhold</a>

  <nav class="nav" aria-label="Primær navigation">
    <a href="index.html" class="nav-logo">Mohamed.</a>
    <ul class="nav-links" role="list">
      <li><a href="index.html#work">Work</a></li>
      <li><a href="index.html#about">About</a></li>
    </ul>
    <a href="#" class="nav-cta" aria-label="Resume">
      Resume <span aria-hidden="true">↗</span>
    </a>
  </nav>

  <main id="main"></main>

  <nav id="js-case-nav" aria-label="Andre projekter"></nav>
  <div class="scroll-progress">
    <div class="scroll-progress-track" aria-hidden="true">
      <div class="scroll-progress-fill" id="js-scroll-progress-fill"></div>
    </div>
    <footer class="scroll-progress-meta">
      <p class="footer-copy">&copy; 2026  &mdash; Alle rettigheder forbeholdes</p>
      <ul class="footer-links" role="list">
        <li><a href="https://github.com/" aria-label="Mohamed på GitHub">GitHub</a></li>
        <li><a href="https://linkedin.com/" aria-label="Mohamed på LinkedIn">LinkedIn</a></li>
        <li><a href="mailto:hi@example.com">Email</a></li>
      </ul>
    </footer>
  </div>


  <script src="js/projects.js"></script>
  <script>
    const scrollProgressFill = document.getElementById('js-scroll-progress-fill');
    let progressRafId = null;

    const updateScrollProgress = () => {
      if (!scrollProgressFill) return;
      const maxScroll = Math.max(0, document.documentElement.scrollHeight - window.innerHeight);
      const ratio = maxScroll > 0 ? window.scrollY / maxScroll : 0;
      const clamped = Math.min(1, Math.max(0, ratio));
      scrollProgressFill.style.transform = `scaleX(${clamped})`;
    };

    const queueProgressUpdate = () => {
      if (progressRafId !== null) return;
      progressRafId = window.requestAnimationFrame(() => {
        progressRafId = null;
        updateScrollProgress();
      });
    };

    window.addEventListener('scroll', queueProgressUpdate, { passive: true });
    window.addEventListener('resize', queueProgressUpdate, { passive: true });
    window.addEventListener('load', queueProgressUpdate);

    const slug = new URLSearchParams(window.location.search).get('slug');
    const project = PROJECTS.find(p => p.slug === slug);
    const main = document.getElementById('main');
    const caseNav = document.getElementById('js-case-nav');
    if (!project) {
      document.title = 'Projekt ikke fundet — Mohamed Portfolio';
      main.innerHTML = `
        <div class="not-found">
          <h1>Projekt ikke fundet</h1>
          <p>Det projekt du leder efter eksisterer ikke eller er blevet fjernet.</p>
          <a href="index.html">&larr; Tilbage til forsiden</a>
        </div>`;
      caseNav.hidden = true;
    } else {
      document.title = `${project.title} — Mohamed Portfolio`;

      const resultCardsHtml = project.results.cards.map((card, i) => `
        <div class="result-card reveal reveal-d${i + 1}">
          <p class="result-number">${card.number}</p>
          <p class="result-desc">${card.desc}</p>
        </div>`).join('');

      const challengeParagraphsHtml = project.challenge.paragraphs
        .map(p => `<p>${p}</p>`).join('');

      const solutionParagraphsHtml = project.solution.paragraphs
        .map(p => `<p>${p}</p>`).join('');

      const introOverviewExtra = project.results.intro
        ? `<p>${project.results.intro}</p>`
        : '';
      const responsibilitiesHtml = Array.isArray(project.responsibilities)
        ? project.responsibilities.map((item) => `<p>${item}</p>`).join('')
        : `<p>${project.responsibilities || project.meta.role}</p>`;

      const inlineData = project.inlineImage;
      const hasInlineMedia = inlineData && typeof inlineData === 'object' && inlineData.src;
      const inlineSrc = hasInlineMedia ? inlineData.src : '';
      const inlineAlt = hasInlineMedia ? inlineData.alt || '' : '';
      const isInlineVideo = hasInlineMedia && inlineSrc.toLowerCase().endsWith('.mp4');
      const inlineMediaHtml = hasInlineMedia
        ? (isInlineVideo
            ? `<video class="case-image-video" autoplay muted loop playsinline aria-label="${inlineAlt}">
                 <source src="${inlineSrc}" type="video/mp4" />
               </video>`
            : `<img
                 src="${inlineSrc}"
                 alt="${inlineAlt}"
                 width="1200" height="675"
                 loading="lazy"
               />`)
        : '';

      const defaultTools = [
        { name: 'React', logo: 'assets/images/React_Logo_0.svg' },
        { name: 'Figma', logo: 'assets/images/Figma_Symbol_0.svg' },
        { name: 'Next.js', logo: 'assets/images/Next.js_Logo_0.svg', logoClass: 'tool-logo--next' },
      ];
      const projectTools = Array.isArray(project.tools) && project.tools.length
        ? project.tools
        : defaultTools;
      const githubTool = { name: 'GitHub', logo: 'assets/images/GitHub_Symbol_0.svg' };
      const hideGithubTool = project.hideGithubTool === true
        || ['dsb-redesign', 'dentaaid-hjemmeside'].includes(project.slug);
      const hasGithubTool = projectTools.some((tool) => {
        const name = (tool.name || '').toLowerCase();
        const logo = (tool.logo || '').toLowerCase();
        return name === 'github' || logo.includes('github');
      });
      const toolsWithGithub = !hideGithubTool && !hasGithubTool
        ? [...projectTools, githubTool]
        : projectTools;
      const toolsHtml = toolsWithGithub.map((tool) => `
                    <span class="tool-item">
                      <img class="tool-logo ${tool.logoClass || ''}" src="${tool.logo}" alt="${tool.name} logo" width="24" height="24" loading="lazy" decoding="async" />
                      <span>${tool.name}</span>
                    </span>`).join('');

      const brandingHtml = project.branding
        ? `<section class="branding-section" aria-labelledby="branding-heading">
            <div class="branding-inner">
              <div class="branding-content reveal reveal-d1">
                <p class="case-intro-eyebrow">Branding</p>
                <h2 id="branding-heading" class="branding-title">${project.branding.heading}</h2>
                <p>${project.branding.text}</p>
              </div>
              <figure class="branding-media reveal reveal-d2">
                <img
                  src="${project.branding.image.src}"
                  alt="${project.branding.image.alt}"
                  width="960" height="640"
                  loading="lazy"
                />
              </figure>
            </div>
          </section>`
        : '';

      const designDecisionsHtml = project.designDecisions && project.showDesignDecisions !== false
        ? `<section class="design-section" aria-labelledby="design-heading">
            <div class="design-header reveal reveal-d1">
              <p class="case-intro-eyebrow">Designvalg</p>
              <h2 id="design-heading">${project.designDecisions.heading}</h2>
            </div>
            <div class="design-grid">
              ${project.designDecisions.paragraphs.map((p, i) => `
                <article class="design-card reveal reveal-d${i + 2}">
                  <div class="design-card-text">
                    <p>${p.text}</p>
                  </div>
                  ${p.image ? `<div class="design-card-media"><img src="${p.image}" alt="" loading="lazy" /></div>` : ''}
                </article>`).join('')}
            </div>
          </section>`
        : '';

      main.innerHTML = `
        <!-- VISUAL HERO -->
        <header class="case-hero">
          <div class="case-cover reveal">
            <img
              src="${project.cover.src}"
              alt="${project.cover.alt}"
              width="1920" height="900"
              fetchpriority="high"
            />
          </div>
        </header>

        <!-- INTRO PANEL -->
        <section class="case-intro" aria-labelledby="case-title">
          <div class="case-intro-inner">
            <div class="case-intro-top">
              <div class="case-intro-heading reveal reveal-d1">
                <p class="case-intro-eyebrow">${project.eyebrow}</p>
                <h1 id="case-title" class="case-intro-title">${project.title}</h1>
                <p class="case-intro-subtitle">${project.subtitle}</p>
                ${project.liveUrl ? `
                  <div class="case-live">
                    <a class="case-live-link" href="${project.liveUrl}" target="_blank" rel="noopener noreferrer">
                      Se live side <span aria-hidden="true">↗</span>
                    </a>
                    ${project.liveNote ? `<span class="case-live-note">${project.liveNote}</span>` : ''}
                  </div>
                ` : ''}
              </div>
              <dl class="case-intro-meta reveal reveal-d2">
                <div class="intro-meta-item">
                  <dt>Klient</dt>
                  <dd>${project.meta.client}</dd>
                </div>
                <div class="intro-meta-item">
                  <dt>Periode</dt>
                  <dd>${project.meta.period}</dd>
                </div>
                <div class="intro-meta-item">
                  <dt>Rolle</dt>
                  <dd>${project.meta.role}</dd>
                </div>
              </dl>
            </div>

            <div class="case-intro-divider" aria-hidden="true"></div>

            <div class="case-intro-content">
              <article class="intro-column reveal reveal-d2" aria-labelledby="overview-heading">
                <h2 id="overview-heading">Overview</h2>
                <p>${project.summary.lead}</p>
                ${introOverviewExtra}
              </article>

              <article class="intro-column reveal reveal-d3" aria-labelledby="role-heading">
                <h2 id="role-heading">Ansvarsområder</h2>
                ${responsibilitiesHtml}
                <div class="tools-stack" aria-label="V&aelig;rkt&oslash;jer">
                  <h2 class="tools-title">V&aelig;rkt&oslash;jer</h2>
                  <div class="tools-list">
                    ${toolsHtml}
                  </div>
                </div>
              </article>
            </div>

            <section class="intro-outcomes" aria-labelledby="outcomes-heading">
              <h2 id="outcomes-heading" class="reveal reveal-d3">Resultater</h2>
              <div class="intro-outcomes-grid">
                ${resultCardsHtml}
              </div>
            </section>
          </div>
        </section>

        <!-- CHALLENGE -->
        <section class="process-panel process-panel--challenge" aria-labelledby="challenge-heading">
          <div class="process-panel-inner">
            <header class="process-panel-header reveal reveal-d1">
              <p class="case-intro-eyebrow">Udfordring</p>
              <h2 id="challenge-heading" class="process-panel-title">${project.challenge.heading}</h2>
            </header>
            <div class="case-intro-divider" aria-hidden="true"></div>
            <div class="process-panel-content reveal reveal-d2">
              ${challengeParagraphsHtml}
            </div>
          </div>
        </section>

        <!-- APPROACH -->
        <section class="process-panel process-panel--approach" aria-labelledby="solution-heading">
          <div class="process-panel-inner">
            <header class="process-panel-header reveal reveal-d1">
              <p class="case-intro-eyebrow">Tilgang / proces</p>
              <h2 id="solution-heading" class="process-panel-title">${project.solution.heading}</h2>
            </header>
            <div class="case-intro-divider" aria-hidden="true"></div>
            <div class="process-panel-content reveal reveal-d2">
              ${solutionParagraphsHtml}
            </div>
          </div>
        </section>

        ${brandingHtml}

        <!-- INLINE IMAGE -->
        ${hasInlineMedia ? `
        <div class="container">
          <figure class="case-image reveal">
            ${inlineMediaHtml}
            <figcaption>${inlineData.caption || ''}</figcaption>
          </figure>
        </div>
        ` : ''}

        <!-- DESIGN DECISIONS -->
        ${designDecisionsHtml}`;

      // Image lightbox
      let lightbox = document.getElementById('js-lightbox');
      if (!lightbox) {
        lightbox = document.createElement('div');
        lightbox.id = 'js-lightbox';
        lightbox.className = 'lightbox';
        lightbox.setAttribute('role', 'dialog');
        lightbox.setAttribute('aria-modal', 'true');
        lightbox.setAttribute('aria-hidden', 'true');
        lightbox.innerHTML = `
          <button class="lightbox-close" type="button" aria-label="Luk billede">&times;</button>
          <img class="lightbox-img" alt="" />
        `;
        document.body.appendChild(lightbox);
      }

      const lightboxImg = lightbox.querySelector('.lightbox-img');
      const lightboxClose = lightbox.querySelector('.lightbox-close');

      const openLightbox = (src, alt) => {
        lightboxImg.src = src;
        lightboxImg.alt = alt || '';
        lightbox.classList.add('is-open');
        lightbox.setAttribute('aria-hidden', 'false');
        document.body.classList.add('lightbox-open');
      };

      const closeLightbox = () => {
        lightbox.classList.remove('is-open');
        lightbox.setAttribute('aria-hidden', 'true');
        document.body.classList.remove('lightbox-open');
        lightboxImg.src = '';
      };

      lightboxClose.addEventListener('click', closeLightbox);
      lightbox.addEventListener('click', (event) => {
        if (event.target === lightbox) {
          closeLightbox();
        }
      });
      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape' && lightbox.classList.contains('is-open')) {
          closeLightbox();
        }
      });

      main.addEventListener('click', (event) => {
        const img = event.target.closest('img');
        if (!img) return;
        if (!img.matches('.case-cover img, .case-image img, .design-card-media img')) return;
        openLightbox(img.currentSrc || img.src, img.alt);
      });

      // CASE NAV
      const prevHtml = project.nav.prev
        ? `<a href="projekt.html?slug=${project.nav.prev.slug}" class="case-nav-link" aria-label="Forrige projekt: ${project.nav.prev.title}">
             <span class="case-nav-dir">&larr; Forrige projekt</span>
             <span class="case-nav-title">${project.nav.prev.title}</span>
           </a>`
        : `<a href="index.html" class="case-nav-link" aria-label="Tilbage til alle projekter">
             <span class="case-nav-dir">&larr; Alle projekter</span>
             <span class="case-nav-title">Oversigt</span>
           </a>`;

      const nextHtml = project.nav.next
        ? `<a href="projekt.html?slug=${project.nav.next.slug}" class="case-nav-link next" aria-label="Næste projekt: ${project.nav.next.title}">
             <span class="case-nav-dir">N&aelig;ste projekt &rarr;</span>
             <span class="case-nav-title">${project.nav.next.title}</span>
           </a>`
        : '';

      caseNav.innerHTML = prevHtml + nextHtml;

      // Reveal animations
      const reveals = document.querySelectorAll('.reveal');
      const observer = new IntersectionObserver(
        (entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.classList.add('is-visible');
              observer.unobserve(entry.target);
            }
          });
        },
        { threshold: 0.08 }
      );
      reveals.forEach(el => observer.observe(el));

      const contentImages = main.querySelectorAll('img');
      contentImages.forEach((img) => {
        if (!img.complete) {
          img.addEventListener('load', queueProgressUpdate, { once: true });
        }
      });
    }

    queueProgressUpdate();
  </script>

</body>
</html>
